<script>
let currentPlan = 'free';
let usageLeft = 3;

const textarea = document.getElementById('inputText');
const charCount = document.getElementById('charCount');

textarea.addEventListener('input', () => {
  charCount.textContent = textarea.value.length;
});

function switchPlan(plan) {
  currentPlan = plan;
  document.querySelectorAll('.plan-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  const badge = document.getElementById('planBadge');
  const usage = document.getElementById('usageCount');
  const usageInfo = document.querySelector('.usage-info');
  if (plan === 'free') { badge.textContent = 'Free (3/day)'; usageLeft = 3; usage.textContent = '3'; usageInfo.innerHTML = '本日の残り回数: <strong>3</strong> / 3回（Free プラン）'; }
  if (plan === 'premium') { badge.textContent = 'Premium'; usageLeft = 999; usageInfo.innerHTML = '無制限（Premium プラン）'; }
  if (plan === 'pro') { badge.textContent = 'Pro'; usageLeft = 999; usageInfo.innerHTML = '無制限 + 深層分析（Pro プラン）'; }
}

// Demo analysis database
const demoAnalysis = {
  'default_negative': {

    emotions: { '怒り': 25, '不満': 65, '期待': 40, '好意': 15, '不安': 50 },
    keigo: 2,
    replies: [
      { tone: '共感型', text: 'そう感じてるんだね。もう少し詳しく聞かせてもらえると嬉しいです。' },
      { tone: '確認型', text: '本当に大丈夫？何か気になることがあれば遠慮なく言ってね。' },
      { tone: '提案型', text: '一度ゆっくり話す時間を作らない？直接会って話したいな。' }
    ]
  },
  'default_positive': {
    surface: '好意的で前向きな気持ちを伝えている',
    honne: '相手に対してポジティブな感情を持っており、関係を良好に保ちたいという意思が見える。言葉に偽りはなく、素直な気持ちの表現である可能性が高い。',
    emotions: { '怒り': 5, '不満': 5, '期待': 70, '好意': 85, '不安': 10 },
    keigo: 2,
    replies: [
      { tone: '感謝型', text: 'ありがとう！そう言ってもらえると本当に嬉しいです。' },
      { tone: '共感型', text: '私も同じ気持ちです！これからもよろしくお願いします。' },
      { tone: 'カジュアル型', text: 'えー嬉しい！ありがとね！' }
    ]
  },
  'default_formal': {
    surface: 'ビジネス上の丁寧な対応をしている',
    honne: '形式的な丁寧さの裏に、本心を隠している可能性がある。敬語のレベルが高いほど、心理的な距離を置きたい気持ちが強い場合がある。',
    emotions: { '怒り': 15, '不満': 35, '期待': 30, '好意': 25, '不安': 45 },
    keigo: 4,
    replies: [
      { tone: 'ビジネス型', text: 'ご連絡ありがとうございます。承知いたしました。改めてご相談させていただければ幸いです。' },
      { tone: '柔らかめ', text: 'ありがとうございます。何かございましたらいつでもお気軽にお声がけください。' },
      { tone: '率直型', text: 'ありがとうございます。もしよろしければ、率直なご意見をいただけると助かります。' }
    ]
  },
  'default_short': {
    surface: '短い返事で了承を示している',
    honne: '短い返答は、関心の低さや面倒に感じている可能性を示唆する。「わかった」だけでは本当に理解・納得しているかは不明。感情を出したくない、または会話を早く終わらせたい心理がうかがえる。',
    emotions: { '怒り': 30, '不満': 50, '期待': 15, '好意': 20, '不安': 25 },
    keigo: 1,
    replies: [
      { tone: '確認型', text: '了解！ちなみに何か気になる点はある？' },
      { tone: '配慮型', text: '忙しいところごめんね。また時間ある時に詳しく聞かせて。' },
      { tone: '直球型', text: '大丈夫？何か思うところあったら言ってね。' }
    ]
  }
};

// Known phrases
const knownPhrases = {
  '別にいいよ': {
    surface: '了承・許可を示している',
    honne: '「別に」という言葉には投げやりなニュアンスが含まれる。本当は良くないが、これ以上議論する気力がない、または相手に期待するのを諦めた可能性が高い。',
    emotions: { '怒り': 35, '不満': 70, '期待': 20, '好意': 10, '不安': 30 },
    keigo: 1,
    replies: [
      { tone: '寄り添い型', text: '無理してない？本当のこと言ってくれていいんだよ。' },
      { tone: '確認型', text: 'ごめんね、もしかして嫌だった？ちゃんと聞きたいな。' },
      { tone: '行動型', text: '別の案も考えてみたんだけど、こっちはどう？' }
    ]
  },
  '大丈夫': {
    surface: '問題ないことを伝えている',
    honne: '日本語の「大丈夫」は最も多義的な表現の一つ。「大丈夫」と言いながら大丈夫でないケースは非常に多い。声のトーンや文脈が重要だが、テキストでは相手に心配をかけたくない気持ちの表れであることが多い。',
    emotions: { '怒り': 10, '不満': 40, '期待': 25, '好意': 30, '不安': 60 },
    keigo: 1,
    replies: [
      { tone: '共感型', text: '本当に？無理しなくていいからね。いつでも話聞くよ。' },
      { tone: '具体型', text: '何か手伝えることがあったら言ってね。一人で抱え込まないで。' },
      { tone: '軽め型', text: 'そっか、何かあったらいつでも連絡してね！' }
    ]
  },
  '了解': {
    surface: '理解・承認を示している',
    honne: '最小限の返答である「了解」は、積極的な同意ではなく消極的な受容の場合が多い。特に普段もっと言葉数が多い相手からの「了解」は、不満や疲れのサインかもしれない。',
    emotions: { '怒り': 20, '不満': 45, '期待': 10, '好意': 15, '不安': 20 },
    keigo: 1,
    replies: [
      { tone: '丁寧型', text: 'ありがとう！何か質問があればいつでも聞いてね。' },

    ]
  },
  'お疲れ様': {
    surface: '労いの挨拶をしている',
    honne: '定型的な挨拶だが、タイミングや文脈によって意味が変わる。仕事終わりの「お疲れ様」は純粋な労い。しかし会話の切り上げとして使われる場合は、これ以上の会話を望んでいないサインの可能性がある。',

    keigo: 3,
    replies: [
      { tone: '元気型', text: 'お疲れ様！今日も一日頑張ったね。ゆっくり休んでね。' },
      { tone: '気遣い型', text: 'お疲れ様です。最近忙しそうだけど体調は大丈夫？' },
      { tone: '誘い型', text: 'お疲れ様！今度の週末、息抜きにどこか行かない？' }
    ]
  }
};

function analyzeText(text) {
  const trimmed = text.trim();

  // Check known phrases
  for (const [phrase, result] of Object.entries(knownPhrases)) {
    if (trimmed.includes(phrase)) return result;
  }

  // Smart fallback
  const hasEllipsis = trimmed.includes('...') || trimmed.includes('…');
  const hasExclamation = trimmed.includes('！') || trimmed.includes('!');
  const isShort = trimmed.length < 10;
  const hasSumimasen = trimmed.includes('すみません') || trimmed.includes('申し訳');
  const hasChotto = trimmed.includes('ちょっと') || trimmed.includes('微妙');
  const hasPositive = trimmed.includes('ありがとう') || trimmed.includes('嬉しい') || trimmed.includes('楽しい') || trimmed.includes('最高');
  const hasFormal = trimmed.includes('ございます') || trimmed.includes('いただ') || trimmed.includes('存じ') || trimmed.includes('幸い');

  if (hasPositive) return demoAnalysis['default_positive'];
  if (hasFormal) return demoAnalysis['default_formal'];
  if (hasSumimasen || hasChotto) return {
    surface: '申し訳なさや遠慮を表現している',
    honne: '「すみません」「ちょっと」は日本語における婉曲的な拒否や不満の前置き。本当に言いたいことは別にある可能性が高く、相手への配慮から直接的な表現を避けている。',
    emotions: { '怒り': 20, '不満': 55, '期待': 30, '好意': 25, '不安': 60 },
    keigo: 3,
    replies: [
      { tone: '受容型', text: '気にしないでください。率直に言ってもらえると助かります。' },
      { tone: '確認型', text: '何か気になることがありましたか？遠慮なくおっしゃってください。' },
      { tone: '提案型', text: '別の方法も検討してみましょうか？' }
    ]
  };
  if (isShort) return demoAnalysis['default_short'];
  if (hasEllipsis) return demoAnalysis['default_negative'];

  return demoAnalysis['default_negative'];
}

function analyze() {
  const text = document.getElementById('inputText').value.trim();
  if (!text) { alert('テキストを入力してください'); return; }
  if (currentPlan === 'free' && usageLeft <= 0) { alert('本日の無料回数を使い切りました。\nPremiumプランにアップグレードすると無制限で使えます。'); return; }

  // Show loading
  document.getElementById('results').classList.remove('show');
  document.getElementById('loading').classList.add('show');
  document.getElementById('analyzeBtn').disabled = true;

  const phases = ['テキストを解析中...', '感情パターンを検出中...', '本音を推定中...'];
  let phase = 0;
  const phaseInterval = setInterval(() => {
    phase++;
    if (phase < phases.length) {
      document.getElementById('loadingText').textContent = phases[phase];
    }
  }, 800);

  setTimeout(() => {
    clearInterval(phaseInterval);
    document.getElementById('loading').classList.remove('show');
    document.getElementById('analyzeBtn').disabled = false;

    if (currentPlan === 'free') {
      usageLeft--;
      document.getElementById('usageCount').textContent = usageLeft;
    }

    const result = analyzeText(text);
    displayResult(result, text);
  }, 2500);
}

function displayResult(result, originalText) {
  document.getElementById('surfaceText').textContent = result.surface;
  document.getElementById('honneText').textContent = result.honne;

  const keigoLabels = ['', 'タメ口', 'カジュアル', '標準敬語', '丁寧', '最上級敬語'];
  document.getElementById('keigoBadge').textContent = '敬語レベル: ' + keigoLabels[result.keigo];

  // Emotion bars
  const emotionColors = { '怒り': '#e53e3e', '不満': '#ed8936', '期待': '#38b2ac', '好意': '#38a169', '不安': '#805ad5' };
  const barsHtml = Object.entries(result.emotions).map(([name, value]) => `
    <div class="emotion-bar">
      <span class="emotion-name">${name}</span>
      <div class="emotion-track">
        <div class="emotion-fill" style="width: ${value}%; background: ${emotionColors[name] || '#667eea'}"></div>
      </div>
      <span class="emotion-value">${value}%</span>
    </div>
  `).join('');
  document.getElementById('emotionBars').innerHTML = barsHtml;

  // Reply cards
  const repliesHtml = result.replies.map((r, i) => `
    <div class="reply-card" onclick="copyReply(this, '${r.text.replace(/'/g, "\\'")}')">
      <div class="reply-tone">${r.tone}</div>
      <div class="reply-text">${r.text}</div>
      <div class="copied-msg" id="copied${i}">コピーしました！</div>
    </div>
  `).join('');
  document.getElementById('replyCards').innerHTML = repliesHtml;

  // Share button
  const shareText = encodeURIComponent(`KuukiAIで「${originalText.substring(0, 20)}...」を分析してみた！\n本音が丸見えで怖い...\n\n#KuukiAI #空気読みAI`);
  document.getElementById('shareBtn').href = `https://twitter.com/intent/tweet?text=${shareText}`;

  document.getElementById('results').classList.add('show');
}

function copyReply(card, text) {
  navigator.clipboard.writeText(text).then(() => {
    const msg = card.querySelector('.copied-msg');
    msg.style.display = 'block';
    setTimeout(() => { msg.style.display = 'none'; }, 2000);
  });
}
</script>
