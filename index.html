<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KuukiAI - 空気読みAI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      color: #2d3748;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      text-align: center;
      color: white;
      margin-bottom: 30px;
      padding-top: 20px;
    }

    .header h1 {
      font-size: 36px;
      margin-bottom: 8px;
      font-weight: 800;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }

    .header p {
      font-size: 16px;
      opacity: 0.95;
    }

    /* Main Card */
    .main-card {
      background: white;
      border-radius: 24px;
      padding: 32px 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      margin-bottom: 30px;
    }

    .section-title {
      font-size: 18px;
      font-weight: 700;
      color: #2d3748;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Input Section */
    .input-section {
      margin-bottom: 24px;
    }

    .textarea-wrapper {
      position: relative;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      padding: 16px;
      border: 2px solid #e2e8f0;
      border-radius: 16px;
      font-size: 16px;
      font-family: inherit;
      resize: vertical;
      transition: border-color 0.2s;
      color: #2d3748;
    }

    textarea:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .char-count {
      font-size: 12px;
      color: #a0aec0;
      margin-top: 8px;
      text-align: right;
    }

    /* Scene Selector */
    .scene-section {
      margin-bottom: 24px;
    }

    .scene-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .scene-btn {
      padding: 10px 16px;
      border: 2px solid #e2e8f0;
      background: white;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s;
      color: #718096;
    }

    .scene-btn:hover {
      border-color: #667eea;
      color: #667eea;
    }

    .scene-btn.active {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border-color: transparent;
    }

    /* Plan Selector */
    .plan-section {
      margin-bottom: 24px;
    }

    .plan-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .plan-btn {
      flex: 1;
      min-width: 100px;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      background: white;
      border-radius: 16px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s;
      color: #718096;
    }

    .plan-btn:hover {
      border-color: #667eea;
      color: #667eea;
    }

    .plan-btn.active {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border-color: transparent;
    }

    /* Analyze Button */
    .analyze-btn {
      width: 100%;
      padding: 16px;
      border: none;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      font-size: 17px;
      font-weight: 700;
      border-radius: 14px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      min-height: 52px;
    }

    .analyze-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 30px rgba(102, 126, 234, 0.4);
    }

    .analyze-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Results Section */
    .results {
      display: none;
      animation: slideIn 0.6s ease-out;
    }

    .results.show {
      display: block;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .result-card {
      background: linear-gradient(135deg, #f8f9ff, #f0f4ff);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 16px;
      border-left: 6px solid #667eea;
    }

    .result-card.honne {
      border-left-color: #764ba2;
      background: linear-gradient(135deg, #f8f7ff, #f4f0ff);
    }

    .result-label {
      font-size: 12px;
      font-weight: 700;
      color: #667eea;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .result-text {
      font-size: 16px;
      color: #2d3748;
      line-height: 1.6;
    }

    /* Emotions Chart */
    .emotions-chart {
      margin-top: 24px;
    }

    .emotion-bar {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
      gap: 12px;
    }

    .emotion-name {
      width: 60px;
      font-size: 14px;
      font-weight: 600;
      color: #4a5568;
      flex-shrink: 0;
    }

    .emotion-track {
      flex: 1;
      height: 12px;
      background: #edf2f7;
      border-radius: 12px;
      overflow: hidden;
    }

    .emotion-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      border-radius: 12px;
      transition: width 0.6s ease-out;
    }

    .emotion-value {
      width: 40px;
      font-size: 13px;
      font-weight: 600;
      color: #718096;
      text-align: right;
    }

    /* Keigo Level */
    .keigo-level {
      margin-top: 20px;
      padding: 16px;
      background: white;
      border-radius: 12px;
    }

    .keigo-label {
      font-size: 12px;
      font-weight: 700;
      color: #718096;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .keigo-bar {
      display: flex;
      height: 24px;
      gap: 4px;
      background: #edf2f7;
      border-radius: 12px;
      padding: 2px;
    }

    .keigo-level-item {
      flex: 1;
      background: #cbd5e0;
      border-radius: 8px;
      transition: background 0.3s;
    }

    .keigo-level-item.active {
      background: linear-gradient(135deg, #667eea, #764ba2);
    }

    .keigo-desc {
      font-size: 13px;
      color: #4a5568;
      margin-top: 8px;
      font-weight: 500;
    }

    /* Replies */
    .replies-section {
      margin-top: 24px;
    }

    .replies-grid {
      display: grid;
      gap: 12px;
    }

    .reply-card {
      background: white;
      border: 2px solid #e2e8f0;
      border-radius: 16px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }

    .reply-card:hover {
      border-color: #667eea;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
    }

    .reply-tone {
      font-size: 12px;
      font-weight: 700;
      color: #667eea;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .reply-text {
      font-size: 15px;
      color: #2d3748;
      line-height: 1.5;
      word-wrap: break-word;
      margin-bottom: 12px;
    }

    .copy-btn {
      padding: 8px 16px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
    }

    .copy-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }

    .copied-msg {
      display: none;
      position: absolute;
      top: -30px;
      left: 50%;
      transform: translateX(-50%);
      background: #2d3748;
      color: white;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      z-index: 10;
    }

    /* Diagnosis section */
    .diagnosis-section {
      max-width: 600px;
      margin: 0 auto;
      padding: 0 16px 40px;
    }

    .diagnosis-card {
      background: white;
      border-radius: 20px;
      padding: 28px 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      text-align: center;
    }

    .diagnosis-header {
      margin-bottom: 20px;
    }

    .diagnosis-header h3 {
      font-size: 20px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .diagnosis-progress {
      font-size: 14px;
      color: #718096;
      margin-bottom: 16px;
    }

    .diagnosis-progress-bar {
      width: 100%;
      height: 8px;
      background: #edf2f7;
      border-radius: 8px;
      overflow: hidden;
      margin-top: 8px;
    }

    .diagnosis-progress-fill {
      height: 100%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 8px;
      transition: width 0.5s ease;
    }

    .diagnose-btn {
      width: 100%;
      padding: 16px;
      border: none;
      background: linear-gradient(135deg, #f093fb, #f5576c);
      color: white;
      font-size: 17px;
      font-weight: 700;
      border-radius: 14px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      min-height: 52px;
    }

    .diagnose-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 30px rgba(245, 87, 108, 0.4);
    }

    .diagnose-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      background: #cbd5e0;
    }

    .diagnose-btn-locked {
      background: #cbd5e0;
      color: #718096;
    }

    /* Diagnosis result */
    .diagnosis-result {
      display: none;
      text-align: center;
      animation: resultSlideIn 0.6s ease-out;
    }

    .diagnosis-result.show {
      display: block;
    }

    @keyframes resultSlideIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .diagnosis-type-emoji {
      font-size: 64px;
      margin-bottom: 8px;
    }

    .diagnosis-type-name {
      font-size: 26px;
      font-weight: 800;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
    }

    .diagnosis-title {
      font-size: 16px;
      color: #764ba2;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .diagnosis-description {
      font-size: 15px;
      color: #4a5568;
      line-height: 1.7;
      margin-bottom: 20px;
      text-align: left;
      background: #f8f9ff;
      border-radius: 12px;
      padding: 16px;
    }

    /* Stats radar-like bars */
    .diagnosis-stats {
      margin-bottom: 20px;
    }

    .stat-bar {
      display: flex;
      align-items: center;
      margin-bottom: 8px;
      gap: 8px;
    }

    .stat-name {
      width: 56px;
      font-size: 13px;
      font-weight: 600;
      text-align: right;
      flex-shrink: 0;
      color: #4a5568;
    }

    .stat-track {
      flex: 1;
      height: 10px;
      background: #edf2f7;
      border-radius: 10px;
      overflow: hidden;
    }

    .stat-fill {
      height: 100%;
      border-radius: 10px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      transition: width 1s ease-out;
    }

    .stat-value {
      width: 36px;
      font-size: 13px;
      color: #718096;
      font-weight: 600;
    }

    /* Strengths/Weaknesses */
    .diagnosis-sw {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    .diagnosis-sw-col {
      flex: 1;
      text-align: left;
    }

    .diagnosis-sw-col h4 {
      font-size: 14px;
      margin-bottom: 8px;
    }

    .sw-good h4 { color: #38a169; }
    .sw-bad h4 { color: #e53e3e; }

    .diagnosis-sw-col ul {
      list-style: none;
      padding: 0;
    }

    .diagnosis-sw-col li {
      font-size: 13px;
      color: #4a5568;
      padding: 4px 0;
      line-height: 1.4;
    }

    .sw-good li::before { content: '✅ '; }
    .sw-bad li::before { content: '😅 '; }

    .diagnosis-compat {
      background: linear-gradient(135deg, #f0fff4, #f0f4ff);
      border-radius: 12px;
      padding: 14px;
      font-size: 14px;
      color: #2d3748;
      margin-bottom: 12px;
    }

    .diagnosis-advice {
      background: linear-gradient(135deg, #fffff0, #fef3c7);
      border-radius: 12px;
      padding: 14px;
      font-size: 14px;
      color: #92400e;
      margin-bottom: 20px;
      text-align: left;
    }

    /* Share buttons for diagnosis */
    .diagnosis-share {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .diagnosis-share-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 12px 20px;
      border: none;
      border-radius: 25px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      min-height: 44px;
      text-decoration: none;
      color: white;
    }

    .share-x { background: #000; }
    .share-x:hover { background: #333; transform: translateY(-2px); }
    .share-line { background: #06C755; }
    .share-line:hover { background: #05b34c; transform: translateY(-2px); }
    .share-download { background: linear-gradient(135deg, #667eea, #764ba2); }
    .share-download:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(102,126,234,0.4); }

    /* Canvas for image generation (hidden) */
    #diagnosisCanvas {
      display: none;
    }

    .diagnosis-preview-img {
      width: 100%;
      max-width: 400px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      margin: 0 auto 20px auto;
      display: block;
    }

    .diagnosis-reset-btn {
      margin-top: 16px;
      padding: 10px 24px;
      background: transparent;
      border: 2px solid #e2e8f0;
      border-radius: 25px;
      color: #718096;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .diagnosis-reset-btn:hover {
      border-color: #667eea;
      color: #667eea;
    }

    /* Footer */
    footer {
      text-align: center;
      color: rgba(255, 255, 255, 0.8);
      font-size: 13px;
      margin-top: 40px;
      padding-bottom: 20px;
    }

    footer a {
      color: white;
      text-decoration: none;
      font-weight: 600;
    }

    footer a:hover {
      text-decoration: underline;
    }
  
    .reply-card { cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
    .reply-card:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(102,126,234,0.3); }
    .reply-card.selected-reply { border-color: #667eea; background: linear-gradient(135deg, #f0f0ff, #e8e0ff); }
    .reply-card.selected-reply::after { content: '\2713 選択済み'; display: block; text-align: center; color: #667eea; font-weight: bold; margin-top: 8px; font-size: 0.9em; }
    .diagnosis-section.surprise-reveal { animation: surpriseIn 0.8s ease-out; }
    @keyframes surpriseIn { 0% { opacity: 0; transform: translateY(30px) scale(0.95); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
    .selection-counter { display: none; text-align: center; padding: 8px; font-size: 0.85em; color: #888; margin-top: 5px; }
    .selection-counter.show { display: block; }
  </style>

<body>
  <div class="container">
    <div class="header">
      <h1>🔮 KuukiAI</h1>
      <p>メッセージの「空気」を読むAI</p>
    </div>

    <div class="main-card">
      <!-- Input Section -->
      <div class="input-section">
        <div class="section-title">📝 メッセージを入力</div>
        <div class="textarea-wrapper">
          <textarea id="inputText" placeholder="空気を読んでほしいメッセージを入力してください..."></textarea>
          <div class="char-count"><span id="charCount">0</span>/2000</div>
        </div>
      </div>

      <!-- Scene Selection -->
      <div class="scene-section">
        <div class="section-title">🎭 場面を選択</div>
        <div class="scene-buttons">
          <button class="scene-btn active" onclick="setScene(this, 'LINE・チャット')">LINE・チャット</button>
          <button class="scene-btn" onclick="setScene(this, 'ビジネスメール')">ビジネスメール</button>
          <button class="scene-btn" onclick="setScene(this, 'SNS投稿')">SNS投稿</button>
          <button class="scene-btn" onclick="setScene(this, 'その他')">その他</button>
        </div>
      </div>

      <!-- Plan Selection -->
      <div class="plan-section">
        <div class="section-title">💎 分析レベルを選択</div>
        <div class="plan-buttons">
          <button class="plan-btn active" onclick="setPlan(this, 'free')">
            <div style="font-weight: 700;">無料</div>
            <div style="font-size: 12px; opacity: 0.7;">標準分析</div>
          </button>
          <button class="plan-btn" onclick="setPlan(this, 'premium')">
            <div style="font-weight: 700;">プレミアム</div>
            <div style="font-size: 12px; opacity: 0.7;">詳細分析</div>
          </button>
          <button class="plan-btn" onclick="setPlan(this, 'pro')">
            <div style="font-weight: 700;">プロ</div>
            <div style="font-size: 12px; opacity: 0.7;">深層分析</div>
          </button>
        </div>
      </div>

      <!-- Analyze Button -->
      <button class="analyze-btn" id="analyzeBtn" onclick="analyze()">🔍 空気を読む</button>

      <!-- Results -->
      <div class="results" id="results">
        <!-- Surface meaning -->
        <div class="result-card">
          <div class="result-label">📌 表面的な意味</div>
          <div class="result-text" id="surfaceResult"></div>
        </div>

        <!-- True Intentions -->
        <div class="result-card honne">
          <div class="result-label">💭 本音の推定</div>
          <div class="result-text" id="honneResult"></div>
        </div>

        <!-- Emotions -->
        <div class="emotions-chart">
          <div style="font-weight: 700; color: #2d3748; margin-bottom: 12px;">❤️ 感情スコア</div>
          <div id="emotionsResult"></div>
        </div>

        <!-- Keigo Level -->
        <div class="keigo-level">
          <div class="keigo-label">🎀 敬語レベル</div>
          <div class="keigo-bar">
            <div id="keigoLevel1" class="keigo-level-item"></div>
            <div id="keigoLevel2" class="keigo-level-item"></div>
            <div id="keigoLevel3" class="keigo-level-item"></div>
            <div id="keigoLevel4" class="keigo-level-item"></div>

    <div class="diagnosis-section" id="diagnosisSection">

          🔒 あと5回分析すると診断できます
        </button>

        <div class="diagnosis-result" id="diagnosisResult">
          <div class="diagnosis-type-emoji" id="diagTypeEmoji"></div>

          <div class="diagnosis-stats" id="diagStats"></div>

          <div class="diagnosis-sw">
            <div class="diagnosis-sw-col sw-good">
              <h4>💪 強み</h4>
              <ul id="diagStrengths"></ul>
            </div>
            <div class="diagnosis-sw-col sw-bad">
              <h4>😂 あるある</h4>
              <ul id="diagWeaknesses"></ul>

          <div class="diagnosis-share">
            <a class="diagnosis-share-btn share-x" id="diagShareX" href="#" target="_blank">
              <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
              Xでシェア
            </a>
            <a class="diagnosis-share-btn share-line" id="diagShareLine" href="#" target="_blank">
              LINEで送る
            </a>
            <button class="diagnosis-share-btn share-download" id="diagDownloadBtn" onclick="downloadDiagnosisImage()">
              📥 画像を保存
            </button>

  </div>

  <canvas id="diagnosisCanvas" width="1080" height="1600"></canvas>

  <script>
    let currentScene = 'LINE・チャット';
    let currentPlan = 'free';
    let usageLeft = 3;

    // Phase 2: Diagnosis data storage
    const STORAGE_KEY = 'kuukiai_analysis_history';
    const DIAGNOSIS_RESULT_KEY = 'kuukiai_diagnosis_result';

    function getAnalysisHistory() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      } catch { return []; }
    }

    function saveAnalysisToHistory(text, result, chosenTone) {
      const history = getAnalysisHistory();
      history.push({
        text: text.substring(0, 100),
        emotions: result.emotions,
        keigo: result.keigo,
        chosenTone: chosenTone || null,
        timestamp: Date.now()
      });
      // Keep last 50 entries max
      if (history.length > 50) history.splice(0, history.length - 50);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
      updateDiagnosisUI();
    }

    function updateDiagnosisUI() {
      const SELECTIONS_KEY = 'kuukiai_reply_selections';
      let selections = [];
      try { selections = JSON.parse(localStorage.getItem(SELECTIONS_KEY) || '[]'); } catch(e) {}
      const selCount = selections.length;
      const progressEl = document.getElementById('diagnosisProgress');
      const progressBar = document.querySelector('.diagnosis-progress-bar');
      const btn = document.getElementById('diagnoseBtn');
      const savedResult = localStorage.getItem(DIAGNOSIS_RESULT_KEY);
      if (savedResult) {
        if (progressEl) progressEl.style.display = 'none';
        if (progressBar) progressBar.style.display = 'none';
        if (btn) btn.style.display = 'none';
        showDiagnosisResult(JSON.parse(savedResult));
      } else if (selCount >= 5) {
        if (progressEl) progressEl.style.display = 'none';
        if (progressBar) progressBar.style.display = 'none';
        if (btn) btn.style.display = 'none';
      } else {
        document.getElementById('diagnosisSection').style.display = 'none';
        if (progressEl) progressEl.style.display = 'none';
        if (progressBar) progressBar.style.display = 'none';
        if (btn) btn.style.display = 'none';
      }
      updateSelectionCounter();
    }

    function setScene(element, scene) {
      document.querySelectorAll('.scene-btn').forEach(btn => btn.classList.remove('active'));
      element.classList.add('active');
      currentScene = scene;
    }

    function setPlan(element, plan) {
      document.querySelectorAll('.plan-btn').forEach(btn => btn.classList.remove('active'));
      element.classList.add('active');
      currentPlan = plan;
    }

    const inputText = document.getElementById('inputText');
    inputText.addEventListener('input', function() {
      document.getElementById('charCount').textContent = this.value.length;
    });

    async function analyze() {
      // PostHog: interpretation_requested
      try{window.__ph_analyze_t0=Date.now();var __ph_inp=document.getElementById('inputText');posthog.capture('interpretation_requested',{input_length:(__ph_inp&&__ph_inp.value?__ph_inp.value.length:0)});}catch(_){}
      const text = document.getElementById('inputText').value.trim();

      if (!text) {
        alert('メッセージを入力してください');
        return;
      }

      if (text.length > 2000) {
        alert('2000文字以内で入力してください');
        return;
      }

      const btn = document.getElementById('analyzeBtn');
      btn.disabled = true;
      btn.textContent = '🔍 分析中...';

      try {
        // タイムアウト設定（60秒）
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 60000);

      const response = await fetch('/api/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        signal: controller.signal,
        body: JSON.stringify({
          text: text,
          plan: currentPlan,
          scene: currentScene
        })
      });

      clearTimeout(timeoutId);

        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }

        const result = await response.json();

        if (result.error) {
          alert(result.error);
          btn.disabled = false;
          btn.textContent = '🔍 空気を読む';
          return;
        }

        const originalText = text;
        displayResult(result, originalText);
      } catch (error) {
        // PostHog: error_occurred
        try{posthog.capture('error_occurred',{error_type:'analyze_failed',error_message:(typeof error!=='undefined'&&error&&error.message)?String(error.message).substring(0,200):'unknown'});}catch(_){}
      if (error.name === 'AbortError') {
        alert('分析がタイムアウトしました。再度お試しください。');
        return;
      }
        console.error('Error:', error);
        alert('分析に失敗しました。もう一度お試しください。');
        btn.disabled = false;
        btn.textContent = '🔍 空気を読む';
      }
    }

    function displayResult(result, originalText) {
      // PostHog: interpretation_completed
      try{var __ph_lat=window.__ph_analyze_t0?(Date.now()-window.__ph_analyze_t0):null;var __ph_rlen=0;try{__ph_rlen=JSON.stringify(result||{}).length;}catch(_e){}posthog.capture('interpretation_completed',{response_length:__ph_rlen,latency_ms:__ph_lat,mode:'line_read'});}catch(_){}
      // Phase 2: Save to history
      saveAnalysisToHistory(originalText, result, null);

      // Surface meaning
      document.getElementById('surfaceResult').textContent = result.surface || '';

      // True intentions
      document.getElementById('honneResult').textContent = result.honne || '';

      // Emotions
      const emotions = result.emotions || {};
      const emotionsHtml = Object.entries(emotions).map(([name, value]) => `
        <div class="emotion-bar">
          <span class="emotion-name">${name}</span>
          <div class="emotion-track">
            <div class="emotion-fill" style="width: ${value}%"></div>
          </div>
          <span class="emotion-value">${value}</span>
        </div>
      `).join('');
      document.getElementById('emotionsResult').innerHTML = emotionsHtml;

      // Keigo level
      const keigo = result.keigo || 3;
      const keigoDescs = ['', 'タメ口', 'カジュアル', '標準敬語', '丁寧', '最上級敬語'];
      document.getElementById('keigoDesc').textContent = `レベル ${keigo}: ${keigoDescs[keigo] || ''}`;

      for (let i = 1; i <= 5; i++) {
        const el = document.getElementById(`keigoLevel${i}`);
        if (i <= keigo) {
          el.classList.add('active');
        } else {
          el.classList.remove('active');
        }
      }

      // Replies
      const replies = result.replies || [];
      const repliesHtml = replies.map((reply, idx) => `
        <div class="reply-card" data-index="${idx}" data-tone="${reply.tone}" onclick="selectReply(this, '${reply.text.replace(/'/g, "\\'")}', '${reply.tone.replace(/'/g, "\\'")}')">
          <div class="reply-tone">${reply.tone}</div>
          <div class="reply-text">${reply.text}</div>
          <button class="copy-btn" >
            📋 コピーする
          </button>
          <div class="copied-msg">コピーしました!</div>
        </div>
      `).join('');
      document.getElementById('repliesResult').innerHTML = repliesHtml + '<div class="selection-counter" id="selectionCounter"></div>';
          updateSelectionCounter();

      document.getElementById('results').classList.add('show');
      document.getElementById('analyzeBtn').disabled = false;
      document.getElementById('analyzeBtn').textContent = '🔍 空気を読む';

      setTimeout(() => {
        document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 100);
    }

    function selectReply(card, text, tone) {
      card.classList.add('selected-reply');
      const msg = card.querySelector('.copied-msg');
      navigator.clipboard.writeText(text).then(() => {
        if (msg) { msg.style.display = 'block'; setTimeout(() => msg.style.display = 'none', 2000); }
      });
      const SELECTIONS_KEY = 'kuukiai_reply_selections';
      let selections = [];
      try { selections = JSON.parse(localStorage.getItem(SELECTIONS_KEY) || '[]'); } catch(e) {}
      selections.push({ tone: tone, text: text, timestamp: Date.now() });
      if (selections.length > 50) selections.splice(0, selections.length - 50);
      localStorage.setItem(SELECTIONS_KEY, JSON.stringify(selections));
      const history = getAnalysisHistory();
      if (history.length > 0) {
        history[history.length - 1].chosenTone = tone;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
      }
      updateSelectionCounter();
      checkDiagnosisTrigger(selections);
    }

    function updateSelectionCounter() {
      const SELECTIONS_KEY = 'kuukiai_reply_selections';
      let selections = [];
      try { selections = JSON.parse(localStorage.getItem(SELECTIONS_KEY) || '[]'); } catch(e) {}
      const counter = document.getElementById('selectionCounter');
      if (!counter) return;
      const count = selections.length;
      const savedResult = localStorage.getItem(DIAGNOSIS_RESULT_KEY);
      if (savedResult) {
        counter.classList.remove('show');
      } else if (count > 0 && count < 5) {
        counter.classList.add('show');
        counter.textContent = '返信選択: ' + count + ' / 5';
      } else {
        counter.classList.remove('show');
      }
    }

    function checkDiagnosisTrigger(selections) {
      if (selections.length >= 5) {
        const savedResult = localStorage.getItem(DIAGNOSIS_RESULT_KEY);
        if (!savedResult) {
          runDiagnosisFromSelections(selections);
        }
      }
    }

    async function runDiagnosisFromSelections(selections) {
      const diagSection = document.getElementById('diagnosisSection');
      const progressEl = document.getElementById('diagnosisProgress');
      if (progressEl) progressEl.style.display = 'none';
      const progressBar = document.querySelector('.diagnosis-progress-bar');
      if (progressBar) progressBar.style.display = 'none';
      const oldBtn = document.getElementById('diagnoseBtn');
      if (oldBtn) oldBtn.style.display = 'none';
      diagSection.style.display = '';
      diagSection.classList.add('surprise-reveal');
      const loadingEl = document.createElement('div');
      loadingEl.id = 'diagLoadingMsg';
      loadingEl.style.cssText = 'text-align:center;padding:30px;';
      loadingEl.innerHTML = '<div class="loading-spinner"></div><p>あなたの返信パターンからタイプを診断中...</p>';
      const card = diagSection.querySelector('.diagnosis-card');
      card.insertBefore(loadingEl, card.querySelector('.diagnosis-header').nextSibling);
      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 35000);
        const response = await fetch('/api/diagnose', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          signal: controller.signal,
          body: JSON.stringify({ selections: selections.slice(-20) })
        });
        clearTimeout(timeoutId);
        if (!response.ok) throw new Error('API error');
        const result = await response.json();
        localStorage.setItem(DIAGNOSIS_RESULT_KEY, JSON.stringify(result));
        const loadEl = document.getElementById('diagLoadingMsg');
        if (loadEl) loadEl.remove();
        showDiagnosisResult(result);
        updateSelectionCounter();
      } catch (error) {
        console.error('Diagnosis error:', error);
        const loadEl = document.getElementById('diagLoadingMsg');
        if (loadEl) loadEl.remove();
        diagSection.classList.remove('surprise-reveal');
      }
    }

    async function runDiagnosis() {
      const SELECTIONS_KEY = 'kuukiai_reply_selections';
      let selections = [];
      try { selections = JSON.parse(localStorage.getItem(SELECTIONS_KEY) || '[]'); } catch(e) {}
      if (selections.length >= 5) {
        runDiagnosisFromSelections(selections);
      }
    }

    function showDiagnosisResult(result) {
      document.getElementById('diagTypeEmoji').textContent = result.emoji || '🔮';
      document.getElementById('diagTypeName').textContent = result.type || '--';
      document.getElementById('diagTitle').textContent = '〜 ' + (result.title || '') + ' 〜';
      document.getElementById('diagDescription').textContent = result.description || '';

      // Stats bars
      const stats = result.stats || {};
      const statsHtml = Object.entries(stats).map(([name, value]) => `
        <div class="stat-bar">
          <span class="stat-name">${name}</span>
          <div class="stat-track">
            <div class="stat-fill" style="width: ${value}%"></div>
          </div>
          <span class="stat-value">${value}</span>
        </div>
      `).join('');
      document.getElementById('diagStats').innerHTML = statsHtml;

      // Strengths
      const strengthsHtml = (result.strengths || []).map(s => `<li>${s}</li>`).join('');
      document.getElementById('diagStrengths').innerHTML = strengthsHtml;

      // Weaknesses
      const weaknessesHtml = (result.weaknesses || []).map(w => `<li>${w}</li>`).join('');
      document.getElementById('diagWeaknesses').innerHTML = weaknessesHtml;

      // Compatibility & Advice
      document.getElementById('diagCompat').innerHTML = '💑 相性◎: <strong>' + (result.compatibility || '--') + '</strong>';
      document.getElementById('diagAdvice').innerHTML = '💡 ' + (result.advice || '');

      // Generate card image
      generateDiagnosisImage(result);

      // Share URLs
      const shareText = encodeURIComponent(
        `KuukiAIで空気読みタイプ診断したら\n${result.emoji} ${result.type}でした！\n\n「${result.title}」\n\nあなたも診断してみて👇\nhttps://kuukiai.vercel.app\n\n#KuukiAI #空気読みタイプ診断 #コミュニケーション診断`
      );
      document.getElementById('diagShareX').href = `https://twitter.com/intent/tweet?text=${shareText}`;
      document.getElementById('diagShareLine').href = `https://social-plugins.line.me/lineit/share?url=${encodeURIComponent('https://kuukiai.vercel.app')}&text=${shareText}`;

      document.getElementById('diagnosisResult').classList.add('show');

      setTimeout(() => {
        document.getElementById('diagnosisResult').scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 100);
    }

    function generateDiagnosisImage(result) {
      const canvas = document.getElementById('diagnosisCanvas');
      const ctx = canvas.getContext('2d');
      const W = 1080;
      const cardX = 60, cardY = 140, cardW = W - 120;
      const colMaxW = cardW - 140;

      // Pass 1: measure content height
      ctx.font = '26px -apple-system, sans-serif';
      const descLines = wrapText(ctx, result.description || '', cardW - 100, 4);
      let calcY = 520 + descLines.length * 38 + 30;
      calcY += Object.keys(result.stats || {}).length * 44 + 30;

      ctx.font = '22px -apple-system, sans-serif';
      const strengths = result.strengths || [];
      const weaknesses = result.weaknesses || [];
      calcY += 36;
      strengths.forEach(s => { calcY += wrapText(ctx, '✅ ' + s, colMaxW).length * 30 + 4; });
      calcY += 52;
      weaknesses.forEach(w => { calcY += wrapText(ctx, '😅 ' + w, colMaxW).length * 30 + 4; });

      const H = Math.max(calcY + 200, 1350);
      canvas.height = H;

      // Pass 2: draw everything
      const bgGrad = ctx.createLinearGradient(0, 0, W, H);
      bgGrad.addColorStop(0, '#667eea');
      bgGrad.addColorStop(1, '#764ba2');
      ctx.fillStyle = bgGrad;
      ctx.fillRect(0, 0, W, H);

      // White card
      ctx.fillStyle = 'white';
      roundRect(ctx, cardX, cardY, cardW, H - 280, 30);
      ctx.fill();

      // Logo
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.font = 'bold 36px -apple-system, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('KuukiAI 空気読みタイプ診断', W / 2, 100);

      // Emoji
      ctx.font = '100px -apple-system, sans-serif';
      ctx.fillText(result.emoji || '🔮', W / 2, 310);

      // Type name
      ctx.fillStyle = '#4c51bf';
      ctx.font = 'bold 52px -apple-system, sans-serif';
      ctx.fillText(result.type || '', W / 2, 400);

      // Title
      ctx.fillStyle = '#764ba2';
      ctx.font = '30px -apple-system, sans-serif';
      ctx.fillText('〜 ' + (result.title || '') + ' 〜', W / 2, 460);

      // Description
      ctx.fillStyle = '#4a5568';
      ctx.font = '26px -apple-system, sans-serif';
      let descY = 520;
      descLines.forEach(line => {
        ctx.fillText(line, W / 2, descY);
        descY += 38;
      });

      // Stats bars
      const stats = result.stats || {};
      const statEntries = Object.entries(stats);
      let statY = descY + 30;
      ctx.textAlign = 'right';
      ctx.font = 'bold 24px -apple-system, sans-serif';

      statEntries.forEach(([name, value]) => {
        ctx.fillStyle = '#4a5568';
        ctx.textAlign = 'right';
        ctx.fillText(name, cardX + 140, statY + 6);

        ctx.fillStyle = '#edf2f7';
        roundRect(ctx, cardX + 160, statY - 10, 640, 20, 10);
        ctx.fill();

        const fillGrad = ctx.createLinearGradient(cardX + 160, 0, cardX + 160 + 640, 0);
        fillGrad.addColorStop(0, '#667eea');
        fillGrad.addColorStop(1, '#764ba2');
        ctx.fillStyle = fillGrad;
        roundRect(ctx, cardX + 160, statY - 10, 640 * (value / 100), 20, 10);
        ctx.fill();

        ctx.fillStyle = '#718096';
        ctx.textAlign = 'left';
        ctx.font = 'bold 22px -apple-system, sans-serif';
        ctx.fillText(value.toString(), cardX + 820, statY + 6);
        ctx.font = 'bold 24px -apple-system, sans-serif';
        statY += 44;
      });

      // Strengths (full width)
      let swY = statY + 30;
      ctx.textAlign = 'left';
      ctx.fillStyle = '#38a169';
      ctx.font = 'bold 26px -apple-system, sans-serif';
      ctx.fillText('💪 強み', cardX + 60, swY);
      swY += 36;
      ctx.font = '22px -apple-system, sans-serif';
      ctx.fillStyle = '#4a5568';
      strengths.forEach(s => {
        wrapText(ctx, '✅ ' + s, colMaxW).forEach(line => { ctx.fillText(line, cardX + 60, swY); swY += 30; });
        swY += 4;
      });

      swY += 16;
      ctx.fillStyle = '#e53e3e';
      ctx.font = 'bold 26px -apple-system, sans-serif';
      ctx.fillText('😂 あるある', cardX + 60, swY);
      swY += 36;
      ctx.font = '22px -apple-system, sans-serif';
      ctx.fillStyle = '#4a5568';
      weaknesses.forEach(w => {
        wrapText(ctx, '😅 ' + w, colMaxW).forEach(line => { ctx.fillText(line, cardX + 60, swY); swY += 30; });
        swY += 4;
      });

      // Bottom CTA
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.font = 'bold 28px -apple-system, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('あなたも診断してみて → kuukiai.vercel.app', W / 2, H - 80);
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.font = '22px -apple-system, sans-serif';
      ctx.fillText('#KuukiAI #空気読みタイプ診断', W / 2, H - 40);

      // Show preview
      const img = document.getElementById('diagPreviewImg');
      img.src = canvas.toDataURL('image/png');
      img.style.display = 'block';
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function wrapText(ctx, text, maxWidth, maxLines) {
      const lines = [];
      let line = '';
      for (const char of text) {
        const testLine = line + char;
        if (ctx.measureText(testLine).width > maxWidth) {
          lines.push(line);
          line = char;
        } else {
          line = testLine;
        }
      }
      if (line) lines.push(line);
      return lines.slice(0, maxLines || 10);
    }

    function downloadDiagnosisImage() {
      const canvas = document.getElementById('diagnosisCanvas');
      const link = document.createElement('a');
      link.download = 'kuukiai-diagnosis.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    function resetDiagnosis() {
      if (confirm('診断結果と分析履歴をリセットしますか？')) {
        localStorage.removeItem(STORAGE_KEY);
        localStorage.removeItem(DIAGNOSIS_RESULT_KEY);

        // Reset UI
        document.getElementById('diagnosisResult').classList.remove('show');
        const btn = document.getElementById('diagnoseBtn');
        btn.style.display = '';
        btn.disabled = true;
        btn.classList.add('diagnose-btn-locked');
        btn.textContent = '🔒 あと5回分析すると診断できます';
        document.getElementById('diagnosisProgress').style.display = '';
        document.querySelector('.diagnosis-progress-bar').style.display = '';
        updateDiagnosisUI();
      }
    }

    // Initialize diagnosis UI on page load
    updateDiagnosisUI();
  </script>
</body>
</html>
